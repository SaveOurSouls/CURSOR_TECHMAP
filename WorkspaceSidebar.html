<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      :root {
        --accent: #2563EB;
        --accent-h: #1D4ED8;
        --accent-bg: #EFF6FF;
        --txt: #0F172A;
        --txt2: #475569;
        --txt3: #94A3B8;
        --bg: #FFFFFF;
        --surf: #F8FAFC;
        --brd: #E2E8F0;
        --shd: 0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
        --shd-md: 0 4px 16px rgba(0,0,0,.1);
        --r: 8px;
        --r-lg: 12px;
        --red: #DC2626;
        --red-bg: #FEF2F2;
        --grn: #059669;
        --grn-bg: #ECFDF5;
        --pur: #7C3AED;
        --gray: #64748B;
      }

      * { box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        padding: 0;
        margin: 0;
        background: var(--bg);
        color: var(--txt);
        display: flex;
        flex-direction: column;
        height: 100vh;
        font-size: 13px;
        line-height: 1.5;
      }

      /* ─── MAIN TABS ─── */
      .main-header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: var(--bg);
        border-bottom: 1px solid var(--brd);
      }

      .main-tabs {
        display: flex;
        padding: 10px 12px 0;
        gap: 2px;
      }

      .main-tab-btn {
        flex: 1;
        border: none;
        border-radius: var(--r) var(--r) 0 0;
        background: transparent;
        color: var(--txt2);
        font-weight: 500;
        font-size: 12.5px;
        font-family: inherit;
        padding: 9px 8px 8px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color .15s, background .15s;
        width: 100%;
      }

      .main-tab-btn:hover {
        color: var(--accent);
        background: var(--accent-bg);
      }

      .main-tab-btn.active {
        color: var(--accent);
        font-weight: 600;
        border-bottom-color: var(--accent);
      }

      /* ─── SECTIONS ─── */
      .panel-section {
        display: none;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .panel-section.active { display: flex; }

      .templates-panel,
      .materials-panel {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }

      /* ─── TEMPLATES TOOLBAR ─── */
      .templates-toolbar {
        background: var(--bg);
        padding: 12px 14px 10px;
        border-bottom: 1px solid var(--brd);
        flex-shrink: 0;
      }

      /* ─── FORM ELEMENTS ─── */
      input,
      select,
      button,
      textarea {
        width: 100%;
        box-sizing: border-box;
        font-size: 13px;
        font-family: inherit;
      }

      input,
      select,
      textarea {
        padding: 8px 11px;
        margin-bottom: 8px;
        border: 1px solid var(--brd);
        border-radius: var(--r);
        outline: none;
        background: var(--bg);
        color: var(--txt);
        transition: border-color .15s, box-shadow .15s;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37,99,235,.1);
      }

      input::placeholder,
      textarea::placeholder {
        color: var(--txt3);
      }

      button {
        border: none;
        border-radius: var(--r);
        padding: 8px 12px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 500;
        transition: background .15s;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover { background: var(--accent-h); }

      .btn-secondary {
        background: var(--accent-bg);
        color: var(--accent);
      }
      .btn-secondary:hover { background: #DBEAFE; }

      .btn-danger {
        background: var(--red-bg);
        color: var(--red);
      }
      .btn-danger:hover { background: #FEE2E2; }

      /* ─── TEMPLATE CARDS ─── */
      .template-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 12px 14px;
      }

      .template-card {
        border: 1px solid var(--brd);
        border-radius: var(--r-lg);
        padding: 14px;
        margin: 0 0 10px;
        background: var(--bg);
        box-shadow: var(--shd);
        transition: box-shadow .15s, border-color .15s;
      }

      .template-card:hover {
        box-shadow: var(--shd-md);
        border-color: #CBD5E1;
      }

      .template-title {
        font-weight: 600;
        margin-bottom: 3px;
        font-size: 13.5px;
      }

      .template-meta {
        color: var(--txt3);
        font-size: 11.5px;
        margin-bottom: 6px;
        font-weight: 500;
      }

      .template-desc {
        font-size: 12px;
        line-height: 1.5;
        margin-bottom: 10px;
        color: var(--txt2);
      }

      .template-actions {
        display: flex;
        gap: 8px;
      }

      .template-actions button { flex: 1; }

      /* ─── STATUS ─── */
      .section-status {
        margin: 6px 0 0;
        font-size: 11.5px;
        color: var(--accent);
        min-height: 18px;
      }

      /* ─── MATERIAL ROOT ─── */
      .material-root {
        padding: 10px 12px;
        background: var(--bg);
        color: var(--txt);
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        position: relative;
        overflow: hidden;
      }

      /* ─── COLUMN SETTINGS OVERLAY ─── */
      .col-settings-overlay {
        position: absolute;
        inset: 0;
        background: var(--bg);
        z-index: 50;
        display: none;
        flex-direction: column;
      }
      .col-settings-overlay.open { display: flex; }

      .col-settings-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--brd);
        font-weight: 600;
        font-size: 13px;
        flex-shrink: 0;
        background: var(--surf);
      }

      .col-settings-tabs {
        display: flex;
        padding: 8px 10px;
        gap: 6px;
        border-bottom: 1px solid var(--brd);
        flex-shrink: 0;
      }

      .col-settings-tab-btn {
        flex: 1;
        border: 1px solid var(--brd);
        border-radius: var(--r);
        background: var(--bg);
        color: var(--txt2);
        font-size: 11.5px;
        font-weight: 500;
        font-family: inherit;
        padding: 5px 4px;
        cursor: pointer;
        transition: background .15s, color .15s;
        width: 100%;
      }

      .col-settings-tab-btn:hover {
        background: var(--accent-bg);
        color: var(--accent);
      }

      .col-settings-tab-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .col-settings-body {
        flex: 1;
        overflow-y: auto;
        padding: 4px 12px;
      }

      .col-row {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 5px 8px;
        border-bottom: 1px solid var(--brd);
        transition: background .1s;
      }
      .col-row:hover { background: var(--surf); }

      .col-row-btn {
        flex-shrink: 0;
        width: auto;
        margin: 0;
        padding: 2px 6px;
        border: 1px solid var(--brd);
        border-radius: 4px;
        background: var(--bg);
        cursor: pointer;
        font-size: 9px;
        color: var(--txt2);
        line-height: 1.4;
        transition: background .1s, color .1s, border-color .1s;
      }
      .col-row-btn:hover:not(:disabled) {
        background: var(--accent-bg);
        color: var(--accent);
        border-color: var(--accent);
      }
      .col-row-btn:disabled { opacity: .25; cursor: default; }

      .col-row-name {
        flex: 1;
        font-size: 12px;
        color: var(--txt);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }

      .col-cell-ctl {
        display: flex;
        align-items: center;
        gap: 2px;
        flex-shrink: 0;
      }
      .col-cell-num {
        font-size: 11px;
        font-weight: 700;
        min-width: 22px;
        text-align: center;
        background: var(--accent-bg);
        color: var(--accent);
        border-radius: 4px;
        padding: 2px 5px;
        line-height: 1.3;
      }
      .col-settings-hint {
        font-size: 11px;
        color: var(--txt3);
        padding: 6px 8px 2px;
        line-height: 1.4;
      }

      .col-settings-body input[type=checkbox] {
        width: auto;
        margin: 0;
        padding: 0;
        flex-shrink: 0;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .col-settings-footer {
        padding: 10px 14px;
        border-top: 1px solid var(--brd);
        display: flex;
        gap: 8px;
        flex-shrink: 0;
        background: var(--surf);
      }

      .col-settings-mode-bar {
        padding: 8px 14px;
        border-bottom: 1px solid var(--brd);
        background: var(--accent-bg);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .col-mode-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .col-mode-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--txt2);
        flex-shrink: 0;
      }
      .col-mode-opt {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        color: var(--txt);
        cursor: pointer;
        user-select: none;
      }
      .col-mode-opt input[type=radio] {
        accent-color: var(--accent);
        cursor: pointer;
        margin: 0;
        width: auto;
        flex-shrink: 0;
      }
      .col-sep-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }
      .col-sep-row select {
        border: 1px solid var(--brd);
        border-radius: var(--r);
        padding: 3px 7px;
        font-size: 12px;
        background: var(--bg);
        color: var(--txt);
        cursor: pointer;
        font-family: inherit;
      }

      /* ─── DB INNER TABS ─── */
      .tabs {
        display: flex;
        border-bottom: 1px solid var(--brd);
        margin-bottom: 10px;
        flex-wrap: wrap;
        flex-shrink: 0;
        gap: 1px;
      }

      .tab-btn {
        flex: 1;
        padding: 7px 4px;
        border: none;
        background: transparent;
        cursor: pointer;
        font-weight: 500;
        color: var(--txt2);
        font-size: 11px;
        font-family: inherit;
        text-transform: uppercase;
        white-space: nowrap;
        border-bottom: 2px solid transparent;
        border-radius: var(--r) var(--r) 0 0;
        margin-bottom: -1px;
        transition: color .15s, background .15s;
        width: 100%;
      }

      .tab-btn:hover {
        color: var(--accent);
        background: var(--accent-bg);
      }

      .tab-btn.active {
        color: var(--accent);
        font-weight: 600;
        border-bottom-color: var(--accent);
      }

      .tab-content {
        display: none;
        flex-direction: column;
        flex-grow: 1;
        overflow-y: auto;
      }

      .tab-content.active { display: flex; }

      textarea {
        resize: vertical;
        min-height: 42px;
      }

      label {
        font-size: 10.5px;
        font-weight: 600;
        color: var(--accent);
        margin-bottom: 2px;
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex-shrink: 0;
      }

      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 2px;
        flex-shrink: 0;
      }

      .col-half {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      .col-half textarea {
        height: 65px;
        min-height: 65px;
        resize: none;
      }

      .col-half textarea.tall {
        height: 180px;
        min-height: 120px;
      }

      /* ─── SCROLL AREA ─── */
      .scroll-area {
        flex-grow: 1;
        overflow-y: auto;
        border: 1px solid var(--brd);
        border-radius: var(--r);
        margin-bottom: 5px;
        min-height: 60px;
        background: var(--surf);
      }

      #opQueueList {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      /* ─── SEARCH WRAPPERS ─── */
      .mini-search-wrapper {
        position: relative;
        margin-bottom: 6px;
        flex-shrink: 0;
      }

      .mini-search-input {
        margin-bottom: 0 !important;
        border-color: var(--grn) !important;
      }

      .mini-search-input:focus {
        border-color: var(--accent) !important;
        box-shadow: 0 0 0 3px rgba(37,99,235,.1) !important;
      }

      .mini-search-results {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--bg);
        border: 1px solid var(--brd);
        box-shadow: var(--shd-md);
        max-height: 160px;
        overflow-y: auto;
        z-index: 100;
        list-style: none;
        padding: 4px 0;
        margin: 3px 0 0;
        border-radius: var(--r);
      }

      .mini-search-results li {
        padding: 7px 12px;
        border-bottom: 1px solid var(--brd);
        cursor: pointer;
        font-size: 11.5px;
        transition: background .1s;
      }

      .mini-search-results li:last-child { border-bottom: none; }

      .mini-search-results li:hover {
        background: var(--grn-bg);
        color: var(--grn);
      }

      /* ─── BASKET / QUEUE ─── */
      .basket-container {
        border-top: 1px solid var(--brd);
        padding-top: 10px;
        height: 35%;
        display: flex;
        flex-direction: column;
        min-height: 180px;
        flex-shrink: 0;
      }

      .basket-header {
        font-weight: 600;
        font-size: 12.5px;
        margin-bottom: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }

      #opQueueList li {
        padding: 5px 10px;
        font-size: 11.5px;
        background: var(--accent-bg);
        margin-bottom: 2px;
        border-radius: var(--r);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 2.5px solid var(--accent);
      }

      /* ─── REMOVE BTN ─── */
      .remove-btn {
        color: var(--red);
        cursor: pointer;
        font-weight: 600;
        padding: 0 4px;
        font-size: 15px;
        opacity: .6;
        transition: opacity .1s;
        flex-shrink: 0;
      }

      .remove-btn:hover { opacity: 1; }

      /* ─── ACTION BUTTONS ─── */
      .action-btn {
        width: 100%;
        padding: 9px 12px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--r);
        cursor: pointer;
        font-weight: 600;
        font-size: 12.5px;
        font-family: inherit;
        margin-top: 5px;
        flex-shrink: 0;
        transition: background .15s;
      }

      .action-btn:hover { background: var(--accent-h); }

      .action-btn.secondary { background: var(--grn); }
      .action-btn.secondary:hover { background: #047857; }

      .action-btn.purple { background: var(--pur); }
      .action-btn.purple:hover { background: #6D28D9; }

      .action-btn.gray { background: var(--gray); }
      .action-btn.gray:hover { background: #4B5563; }

      .action-btn:disabled {
        background: var(--brd);
        color: var(--txt3);
        cursor: default;
      }

      /* ─── STATUS / WARNINGS ─── */
      .status {
        font-size: 11px;
        color: var(--txt2);
        text-align: center;
        margin-top: 5px;
        min-height: 15px;
        flex-shrink: 0;
      }

      .warning-box {
        color: var(--red);
        font-size: 10.5px;
        margin-top: 5px;
        white-space: pre-wrap;
        font-weight: 600;
        flex-shrink: 0;
      }

      .stats-box {
        color: var(--grn);
        font-size: 10.5px;
        margin-top: 5px;
        white-space: pre-wrap;
        font-weight: 600;
        border-top: 1px dashed var(--brd);
        padding-top: 5px;
        display: none;
        flex-shrink: 0;
      }

      /* ─── OP-TREE ─── */
      .op-tree {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .op-tree .op-group-header {
        padding: 7px 10px 7px 8px;
        border-bottom: 1px solid var(--brd);
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        color: var(--txt);
        display: flex;
        align-items: center;
        gap: 6px;
        user-select: none;
        transition: background .1s;
      }

      .op-tree .op-group-header:hover { background: var(--surf); }

      .op-tree .op-group-header .op-arrow {
        font-size: 9px;
        color: var(--txt3);
        transition: transform .15s;
        flex-shrink: 0;
      }

      .op-tree .op-group-header.open .op-arrow { transform: rotate(90deg); }

      .op-tree .op-group-count {
        margin-left: auto;
        font-size: 10.5px;
        color: var(--txt3);
        font-weight: 400;
        background: var(--surf);
        padding: 1px 6px;
        border-radius: 10px;
        border: 1px solid var(--brd);
      }

      .op-tree .op-children {
        display: none;
        list-style: none;
        padding: 0;
        margin: 0;
        background: var(--surf);
      }

      .op-tree .op-children.open { display: block; }

      .op-tree .op-children li {
        padding: 6px 10px 6px 26px;
        border-bottom: 1px solid var(--brd);
        cursor: pointer;
        font-size: 11.5px;
        color: var(--txt2);
        transition: background .1s;
      }

      .op-tree .op-children li:hover {
        background: var(--accent-bg);
        color: var(--accent);
      }

    </style>
  </head>
  <body>
    <div class="main-header">
      <div class="main-tabs">
        <button id="mainTabTemplatesBtn" class="main-tab-btn" onclick="switchMainTab('templates')">Техкарты</button>
        <button id="mainTabOperationsBtn" class="main-tab-btn" onclick="switchMainTab('operations')">Техоперации</button>
      </div>
    </div>

    <div id="templatesSection" class="panel-section">
      <div class="templates-panel">
        <div class="templates-toolbar">
          <input id="templateSearch" type="text" placeholder="Поиск по названию или операции" />
          <select id="templateCategoryFilter">
            <option value="">Все категории</option>
          </select>
          <div class="section-status" id="templateStatus">Загрузка шаблонов...</div>
        </div>
        <div class="template-list" id="templateList"></div>
      </div>
    </div>

    <div id="operationsSection" class="panel-section">
      <div class="materials-panel">
        <div class="material-root">

          <!-- Column settings overlay -->
          <div id="colSettingsOverlay" class="col-settings-overlay">
            <div class="col-settings-hdr">
              <span>Настройка вывода столбцов</span>
              <button class="action-btn gray" style="width:auto;padding:4px 10px;margin:0;" onclick="closeColumnSettings()">✕ Закрыть</button>
            </div>
            <div class="col-settings-tabs">
              <button class="col-settings-tab-btn active" data-key="ob" onclick="switchColSettingsTab('ob',this)">БД.ОБ</button>
              <button class="col-settings-tab-btn" data-key="op" onclick="switchColSettingsTab('op',this)">БД.ОП</button>
              <button class="col-settings-tab-btn" data-key="ter" onclick="switchColSettingsTab('ter',this)">БД.ТЕР</button>
              <button class="col-settings-tab-btn" data-key="coax" onclick="switchColSettingsTab('coax',this)">БД.КОАКС</button>
            </div>
            <div class="col-settings-mode-bar">
              <div class="col-mode-row">
                <span class="col-mode-label">Режим вывода:</span>
                <label class="col-mode-opt"><input type="radio" name="colOutMode" value="rows" onchange="colSettingsSetMode('rows')"> По строкам</label>
                <label class="col-mode-opt"><input type="radio" name="colOutMode" value="cell" onchange="colSettingsSetMode('cell')"> В одну ячейку</label>
              </div>
              <div class="col-sep-row" id="colSepRow" style="display:none;">
                <span class="col-mode-label">Разделитель строк:</span>
                <select id="colSepSelect" onchange="colSettingsSetSep(this.value)">
                  <option value="\n">↵ Перенос строки</option>
                  <option value=", ">Запятая</option>
                  <option value="; ">Точка с запятой</option>
                </select>
              </div>
              <div class="col-sep-row">
                <span class="col-mode-label">Разделитель столбцов:</span>
                <select id="colCellSepSelect" onchange="colSettingsSetCellSep(this.value)">
                  <option value=" | "> | </option>
                  <option value=" ">Пробел</option>
                  <option value=", ">Запятая</option>
                  <option value=" / "> / </option>
                  <option value=" — "> — </option>
                </select>
              </div>
            </div>
            <div id="colSettingsBody" class="col-settings-body"></div>
            <div class="col-settings-footer">
              <button class="action-btn gray" style="margin:0;" onclick="colSettingsSelectAll()">Выбрать все</button>
              <button class="action-btn gray" style="margin:0;" onclick="colSettingsClearAll()">Снять все</button>
              <button class="action-btn gray" style="margin:0;" onclick="colSettingsReset()">Сбросить</button>
            </div>
          </div>

          <div class="tabs" style="align-items:center;">
            <button class="tab-btn active" onclick="switchOperationsTab('opDbObTab', this)">БД.ОБ</button>
            <button class="tab-btn" onclick="switchOperationsTab('opDbOpTab', this)">БД.ОП</button>
            <button class="tab-btn" onclick="switchOperationsTab('opDbTerTab', this)">БД.ТЕР</button>
            <button class="tab-btn" onclick="switchOperationsTab('opDbKoaxTab', this)">БД.КОАКС</button>
            <button title="Настройка вывода" onclick="openColumnSettings()" style="border:none;background:none;cursor:pointer;font-size:16px;padding:4px 6px;margin-left:auto;color:#94A3B8;" onmouseover="this.style.color='#2563EB'" onmouseout="this.style.color='#94A3B8'">⚙</button>
          </div>

          <div id="opDbObTab" class="tab-content active">
            <button class="action-btn gray" onclick="refreshOperationsDatabase()">Обновить базу техопераций</button>
            <input type="text" id="opDbObSearch" class="mini-search-input" placeholder="Поиск по полю 'Для базы'..." autocomplete="off" />
            <div class="scroll-area">
              <ul id="opDbObResults" class="op-tree"></ul>
            </div>
          </div>

          <div id="opDbOpTab" class="tab-content">
            <button class="action-btn gray" onclick="refreshOperationsDatabase()">Обновить базу техопераций</button>
            <input type="text" id="opDbOpSearch" class="mini-search-input" placeholder="Поиск по названию или номеру..." autocomplete="off" />
            <div class="scroll-area">
              <ul id="opDbOpResults" class="op-tree"></ul>
            </div>
          </div>

          <div id="opDbTerTab" class="tab-content">
            <button class="action-btn gray" onclick="refreshOperationsDatabase()">Обновить базу техопераций</button>
            <input type="text" id="opDbTerSearch" class="mini-search-input" placeholder="Поиск по производителю, серии, комплектующей..." autocomplete="off" />
            <div class="scroll-area">
              <ul id="opDbTerResults" class="op-tree"></ul>
            </div>
          </div>

          <div id="opDbKoaxTab" class="tab-content">
            <button class="action-btn gray" onclick="refreshOperationsDatabase()">Обновить базу техопераций</button>
            <input type="text" id="opDbKoaxSearch" class="mini-search-input" placeholder="Поиск по артикулу, серии, проводу..." autocomplete="off" />
            <div class="scroll-area">
              <ul id="opDbKoaxResults" class="op-tree"></ul>
            </div>
          </div>

          <div class="basket-container">
            <div class="basket-header">
              <span>Очередь техопераций (<span id="opQueueCount">0</span>)</span>
              <span style="color:#2563EB; cursor:pointer; font-size:11px;" onclick="clearOperationQueue()">очистить</span>
            </div>
            <div class="scroll-area">
              <ul id="opQueueList"></ul>
            </div>
            <input type="text" id="opTargetCell" placeholder="Стартовая ячейка, например C5. Пусто = активная." />
            <button id="opPushBtn" class="action-btn" disabled onclick="pushOperationsQueue()">ВЫГРУЗИТЬ В ТАБЛИЦУ</button>
            <div id="opStatus" class="status">База техопераций еще не загружена.</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const INITIAL_MAIN_TAB = "<?= initialTab ?>";
      const STORAGE_KEYS = {
        mainTab: 'techmap-workspace-main-tab',
      };

      let templates = [];
      let operationsLoaded = false;
      let operationsLoading = false;
      let operationDb = {
        dbOb: [],
        dbOp: [],
        dbTer: [],
        dbKoax: [],
        meta: null,
      };
      let activeOperationDbKey = 'dbOb';
      let operationQueues = {
        dbOb: [],
        dbOp: [],
        dbTer: [],
        dbKoax: [],
      };

      function debounce(fn, ms) {
        let timer;
        return function() {
          const ctx = this, args = arguments;
          clearTimeout(timer);
          timer = setTimeout(function() { fn.apply(ctx, args); }, ms);
        };
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function setMainStatus() {}

      function setTemplateStatus(message, isError) {
        const node = document.getElementById('templateStatus');
        node.textContent = message || '';
        node.style.color = isError ? '#c5221f' : '#174ea6';
      }

      function switchMainTab(tabName) {
        document.getElementById('templatesSection').classList.toggle('active', tabName === 'templates');
        document.getElementById('operationsSection').classList.toggle('active', tabName === 'operations');
        document.getElementById('mainTabTemplatesBtn').classList.toggle('active', tabName === 'templates');
        document.getElementById('mainTabOperationsBtn').classList.toggle('active', tabName === 'operations');

        try {
          localStorage.setItem(STORAGE_KEYS.mainTab, tabName);
        } catch (error) {}

        if (tabName === 'templates') {
          startCatalogPoll();
        } else {
          stopCatalogPoll();
        }

        if (tabName === 'operations') {
          ensureOperationsLoaded(false);
          if (operationsLoaded) {
            renderOperationResults(activeOperationDbKey);
          }
        }
      }

      function restoreMainTab() {
        let tabName = INITIAL_MAIN_TAB || 'templates';
        if (tabName !== 'templates' && tabName !== 'operations') {
          tabName = 'templates';
        }
        try {
          tabName = localStorage.getItem(STORAGE_KEYS.mainTab) || tabName;
        } catch (error) {}
        if (tabName !== 'templates' && tabName !== 'operations') {
          tabName = 'templates';
        }
        switchMainTab(tabName);
      }

      function renderTemplates() {
        const list = document.getElementById('templateList');
        const search = document.getElementById('templateSearch').value.trim().toLowerCase();
        const category = document.getElementById('templateCategoryFilter').value;
        const filtered = templates.filter((item) => {
          const haystack = [item.title, item.category, item.description].join(' ').toLowerCase();
          const categoryOk = !category || item.category === category;
          const searchOk = !search || haystack.indexOf(search) >= 0;
          return categoryOk && searchOk;
        });

        if (!filtered.length) {
          list.innerHTML = '<div class="template-card">Ничего не найдено.</div>';
          return;
        }

        list.innerHTML = filtered
          .map(
            (item) => `
              <div class="template-card">
                <div class="template-title">${escapeHtml(item.title)}</div>
                <div class="template-meta">${escapeHtml(item.category || 'Без категории')}${item.sizeLabel ? ` · ${escapeHtml(item.sizeLabel)}` : ''}</div>
                <div class="template-desc">${escapeHtml(item.description || '')}</div>
                <div class="template-actions">
                  <button class="btn-primary" onclick="insertTemplate('${escapeHtml(item.id)}')">Вставить</button>
                  <button class="btn-danger" onclick="confirmDeleteTemplate('${escapeHtml(item.id)}', '${escapeHtml(item.title)}')">Удалить</button>
                </div>
              </div>
            `
          )
          .join('');
      }

      function populateTemplateCategories() {
        const select = document.getElementById('templateCategoryFilter');
        const categories = Array.from(new Set(templates.map((item) => item.category).filter(Boolean))).sort();
        select.innerHTML = '<option value="">Все категории</option>' +
          categories.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`).join('');
      }

      let catalogVersion = null;
      let catalogPollTimer = null;

      function startCatalogPoll() {
        if (catalogPollTimer) return;
        catalogPollTimer = setInterval(pollCatalogVersion, 1000);
      }

      function stopCatalogPoll() {
        clearInterval(catalogPollTimer);
        catalogPollTimer = null;
      }

      function pollCatalogVersion() {
        google.script.run
          .withSuccessHandler((v) => {
            if (catalogVersion !== null && v !== catalogVersion) {
              catalogVersion = v;
              loadTemplates();
            }
            catalogVersion = v;
          })
          .getCatalogVersion();
      }

      function loadTemplates() {
        setTemplateStatus('Загрузка шаблонов...', false);
        google.script.run
          .withSuccessHandler((result) => {
            templates = result || [];
            populateTemplateCategories();
            renderTemplates();
            setTemplateStatus(`Шаблонов доступно: ${templates.length}`, false);
            setMainStatus(`Техкарты: ${templates.length}`, false);
          })
          .withFailureHandler((error) => {
            setTemplateStatus(error.message || 'Не удалось загрузить шаблоны.', true);
            setMainStatus('Ошибка загрузки техкарт', true);
          })
          .getTemplateCatalog();
      }

      function insertTemplate(id) {
        setTemplateStatus('Вставка шаблона...', false);
        google.script.run
          .withSuccessHandler((result) => {
            setTemplateStatus(`Вставлен "${result.title}" → ${result.sheetName}!${result.insertedRange}`, false);
          })
          .withFailureHandler((error) => {
            setTemplateStatus(error.message || 'Не удалось вставить шаблон.', true);
          })
          .insertTemplate(id);
      }

      function confirmDeleteTemplate(id, title) {
        if (!window.confirm(`Удалить шаблон «${title}»?\nЭто действие нельзя отменить.`)) {
          return;
        }
        // Optimistic update — remove immediately, restore on failure
        const removed = templates.find((item) => item.id === id);
        templates = templates.filter((item) => item.id !== id);
        populateTemplateCategories();
        renderTemplates();
        setTemplateStatus(`Удаление «${title}»...`, false);
        google.script.run
          .withSuccessHandler((result) => {
            setTemplateStatus(`Шаблон «${result.title}» удалён. Всего: ${templates.length}`, false);
            setMainStatus(`Техкарты: ${templates.length}`, false);
          })
          .withFailureHandler((error) => {
            if (removed) {
              templates = [...templates, removed];
              populateTemplateCategories();
              renderTemplates();
            }
            setTemplateStatus(error.message || 'Не удалось удалить шаблон.', true);
          })
          .deleteTemplate(id);
      }

      function switchOperationsTab(tabId, btnElement) {
        document.querySelectorAll('#operationsSection .tab-content').forEach((el) => el.classList.remove('active'));
        document.querySelectorAll('#operationsSection .tab-btn').forEach((el) => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btnElement.classList.add('active');
        const dbKeyMap = {
          opDbObTab: 'dbOb',
          opDbOpTab: 'dbOp',
          opDbTerTab: 'dbTer',
          opDbKoaxTab: 'dbKoax',
        };
        activeOperationDbKey = dbKeyMap[tabId] || 'dbOb';
        if (operationsLoaded) {
          renderOperationResults(activeOperationDbKey);
        }
        updateOperationQueueUI();
      }

      function setOperationsStatus(message, isError) {
        const node = document.getElementById('opStatus');
        node.innerText = message || '';
        node.style.color = isError ? '#d93025' : '#70757a';
      }

      function ensureOperationsLoaded(forceRefresh) {
        if (operationsLoading) {
          return;
        }
        if (operationsLoaded && !forceRefresh) {
          return;
        }
        loadOperationsDatabase(forceRefresh === true);
      }

      function loadOperationsDatabase(forceRefresh) {
        operationsLoading = true;
        setOperationsStatus(forceRefresh ? 'Обновление базы техопераций...' : 'Загрузка базы техопераций...', false);
        setMainStatus(forceRefresh ? 'Обновление техопераций...' : 'Чтение базы техопераций...', false);
        google.script.run
          .withSuccessHandler((payload) => {
            operationsLoading = false;
            operationsLoaded = true;
            operationDb = payload || { dbOb: [], dbOp: [], dbTer: [], dbKoax: [], meta: null };
            Object.keys(_colSettingsCache).forEach((k) => { delete _colSettingsCache[k]; });
            Object.keys(_colPlanCache).forEach((k) => { delete _colPlanCache[k]; });
            renderOperationResults(activeOperationDbKey);
            const total = (operationDb.meta && operationDb.meta.recordCount) || 0;
            setOperationsStatus(`База готова: ${total}`, false);
            setMainStatus(`Техоперации: ${total}`, false);
          })
          .withFailureHandler((error) => {
            operationsLoading = false;
            operationsLoaded = false;
            setOperationsStatus(error.message || 'Не удалось загрузить базу техопераций.', true);
            setMainStatus('Ошибка загрузки техопераций', true);
          })
          .getOperationDatabase(forceRefresh === true);
      }

      function refreshOperationsDatabase() {
        ensureOperationsLoaded(true);
      }

      function normalizeSearch(value) {
        return String(value || '').toLowerCase().replace(/\s+/g, '');
      }

      function renderOperationResults(dbKey) {
        if (dbKey === 'dbOb') {
          renderObTree();
          return;
        }
        if (dbKey === 'dbOp') {
          renderOpTree();
          return;
        }
        if (dbKey === 'dbTer') {
          renderTerTree();
          return;
        }
        if (dbKey === 'dbKoax') {
          renderKoaxTree();
          return;
        }
        const config = getOperationTabConfig(dbKey);
        const query = normalizeSearch(document.getElementById(config.searchInputId).value);
        const list = document.getElementById(config.resultsId);
        const rows = operationDb[dbKey] || [];
        list.innerHTML = '';

        const filtered = !query
          ? rows.slice(0, 80)
          : rows.filter((item) => (item.searchText || '').indexOf(query) !== -1).slice(0, 80);

        const fragment = document.createDocumentFragment();
        filtered.forEach((item) => {
          const li = document.createElement('li');
          li.textContent = item.label;
          li.onclick = function onClick() {
            addOperationToQueue(dbKey, item);
          };
          fragment.appendChild(li);
        });
        list.appendChild(fragment);
      }

      function renderObTree() {
        const list = document.getElementById('opDbObResults');
        const query = normalizeSearch(document.getElementById('opDbObSearch').value);
        const rows = operationDb.dbOb || [];
        list.innerHTML = '';

        const filtered = !query
          ? rows
          : rows.filter((item) => (item.searchText || '').indexOf(query) !== -1);

        if (!filtered.length) {
          const empty = document.createElement('li');
          empty.style.padding = '10px';
          empty.style.color = '#80868b';
          empty.style.fontSize = '12px';
          empty.textContent = query ? 'Ничего не найдено.' : 'База не загружена.';
          list.appendChild(empty);
          return;
        }

        const hasTypes = filtered.some((item) => item.obType);
        if (!hasTypes) {
          const ul = document.createElement('ul');
          ul.className = 'op-children open';
          filtered.slice(0, 80).forEach((item) => {
            const li = document.createElement('li');
            li.textContent = item.label;
            li.onclick = function() { addOperationToQueue('dbOb', item); };
            ul.appendChild(li);
          });
          list.appendChild(ul);
          return;
        }

        const groups = new Map();
        filtered.forEach((item) => {
          const key = item.obType || '—';
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(item);
        });

        const fragment = document.createDocumentFragment();
        let firstGroup = true;

        groups.forEach((items, groupName) => {
          const li = document.createElement('li');

          const header = document.createElement('div');
          header.className = 'op-group-header' + (firstGroup && query ? ' open' : '');

          const arrow = document.createElement('span');
          arrow.className = 'op-arrow';
          arrow.textContent = '▶';

          const nameSpan = document.createElement('span');
          nameSpan.textContent = groupName;

          const count = document.createElement('span');
          count.className = 'op-group-count';
          count.textContent = items.length;

          header.appendChild(arrow);
          header.appendChild(nameSpan);
          header.appendChild(count);

          const childList = document.createElement('ul');
          childList.className = 'op-children' + (firstGroup && query ? ' open' : '');

          items.forEach((item) => {
            const child = document.createElement('li');
            child.textContent = item.label;
            child.onclick = function() { addOperationToQueue('dbOb', item); };
            childList.appendChild(child);
          });

          header.onclick = function() {
            const isOpen = header.classList.contains('open');
            header.classList.toggle('open', !isOpen);
            childList.classList.toggle('open', !isOpen);
          };

          li.appendChild(header);
          li.appendChild(childList);
          fragment.appendChild(li);
          firstGroup = false;
        });

        list.appendChild(fragment);
      }

      function renderOpTree() {
        const list = document.getElementById('opDbOpResults');
        const query = normalizeSearch(document.getElementById('opDbOpSearch').value);
        const rows = operationDb.dbOp || [];
        list.innerHTML = '';

        // Filter rows by query (searches both name and number parts of label)
        const filtered = !query
          ? rows
          : rows.filter((item) => (item.searchText || '').indexOf(query) !== -1);

        if (!filtered.length) {
          const empty = document.createElement('li');
          empty.style.padding = '10px';
          empty.style.color = '#80868b';
          empty.style.fontSize = '12px';
          empty.textContent = query ? 'Ничего не найдено.' : 'База не загружена.';
          list.appendChild(empty);
          return;
        }

        // Level 1: Название (group header, collapsible)
        // Level 2: Номер   (leaf, click adds to queue)
        // Use dedicated opName / opNumber fields — never parse label string.
        const groups = new Map();
        filtered.forEach((item) => {
          const groupKey = item.opName || item.label;
          const leafText = item.opNumber || item.label;
          if (!groups.has(groupKey)) {
            groups.set(groupKey, []);
          }
          groups.get(groupKey).push({ item, leafText });
        });

        let firstGroup = true;
        const fragment = document.createDocumentFragment();

        groups.forEach((leaves, groupName) => {
          const li = document.createElement('li');

          const header = document.createElement('div');
          header.className = 'op-group-header' + (firstGroup && query ? ' open' : '');

          const arrow = document.createElement('span');
          arrow.className = 'op-arrow';
          arrow.textContent = '▶';

          const nameSpan = document.createElement('span');
          nameSpan.textContent = groupName;

          const count = document.createElement('span');
          count.className = 'op-group-count';
          count.textContent = leaves.length;

          header.appendChild(arrow);
          header.appendChild(nameSpan);
          header.appendChild(count);

          const childList = document.createElement('ul');
          childList.className = 'op-children' + (firstGroup && query ? ' open' : '');

          leaves.forEach(({ item, leafText }) => {
            const child = document.createElement('li');
            child.textContent = leafText;
            child.title = item.label;
            child.onclick = function onClick() {
              addOperationToQueue('dbOp', item);
            };
            childList.appendChild(child);
          });

          header.onclick = function onHeaderClick() {
            const isOpen = header.classList.contains('open');
            header.classList.toggle('open', !isOpen);
            childList.classList.toggle('open', !isOpen);
          };

          li.appendChild(header);
          li.appendChild(childList);
          fragment.appendChild(li);
          firstGroup = false;
        });

        list.appendChild(fragment);
      }

      function renderTerTree() {
        const list = document.getElementById('opDbTerResults');
        const query = normalizeSearch(document.getElementById('opDbTerSearch').value);
        const rows = operationDb.dbTer || [];
        list.innerHTML = '';

        const filtered = !query
          ? rows
          : rows.filter((item) => (item.searchText || '').indexOf(query) !== -1);

        if (!filtered.length) {
          const empty = document.createElement('li');
          empty.style.cssText = 'padding:10px;color:#80868b;font-size:12px;';
          empty.textContent = query ? 'Ничего не найдено.' : 'База не загружена.';
          list.appendChild(empty);
          return;
        }

        // Build 5-level: Производитель → Product Name → Series → Шаг → Артикул
        const terHeaders = (operationDb.tabs && operationDb.tabs.ter && operationDb.tabs.ter.columnHeaders) || [];
        const stepIdx = terHeaders.findIndex((h) => /тип.контакт/i.test(h));
        const artIdx  = terHeaders.findIndex((h) => /артикул/i.test(h));

        const manufacturers = new Map();
        filtered.forEach((item) => {
          const row  = item.outputRow || [];
          const mfr  = item.terManufacturer || '—';
          const comp = item.terComponent    || item.label;
          const ser  = item.terSeries       || '—';
          const step = (stepIdx >= 0 && row[stepIdx]) || '—';
          const art  = (artIdx  >= 0 && row[artIdx])  || item.label;
          if (!manufacturers.has(mfr)) manufacturers.set(mfr, new Map());
          const compMap = manufacturers.get(mfr);
          if (!compMap.has(comp)) compMap.set(comp, new Map());
          const serMap = compMap.get(comp);
          if (!serMap.has(ser)) serMap.set(ser, new Map());
          const stepMap = serMap.get(ser);
          if (!stepMap.has(step)) stepMap.set(step, []);
          stepMap.get(step).push({ item, art });
        });

        const mkHdr = (pad, color, weight) => {
          const d = document.createElement('div');
          d.className = 'op-group-header';
          if (pad)    d.style.paddingLeft = pad;
          if (color)  d.style.color = color;
          if (weight) d.style.fontWeight = weight;
          return d;
        };
        const mkArrow = () => { const s = document.createElement('span'); s.className = 'op-arrow'; s.textContent = '▶'; return s; };
        const mkCount = (n) => { const s = document.createElement('span'); s.className = 'op-group-count'; s.textContent = n; return s; };
        const mkLabel = (text) => { const s = document.createElement('span'); s.textContent = text; return s; };
        const mkUl = (cls) => { const u = document.createElement('ul'); u.className = cls; return u; };
        const toggle = (hdr, ul) => hdr.onclick = function() {
          const o = hdr.classList.contains('open');
          hdr.classList.toggle('open', !o);
          ul.classList.toggle('open', !o);
        };

        const fragment = document.createDocumentFragment();
        let firstMfr = true;

        manufacturers.forEach((compMap, mfrName) => {
          let total = 0;
          compMap.forEach((sm) => sm.forEach((stm) => stm.forEach((a) => { total += a.length; })));

          const mfrLi = document.createElement('li');
          const mfrHdr = mkHdr(null, null, null);
          mfrHdr.className += (firstMfr && query ? ' open' : '');
          mfrHdr.appendChild(mkArrow()); mfrHdr.appendChild(mkLabel(mfrName)); mfrHdr.appendChild(mkCount(total));

          const mfrUl = mkUl('op-children' + (firstMfr && query ? ' open' : ''));
          toggle(mfrHdr, mfrUl);

          compMap.forEach((serMap, compName) => {
            let compTotal = 0;
            serMap.forEach((stm) => stm.forEach((a) => { compTotal += a.length; }));

            const compLi = document.createElement('li'); compLi.style.padding = '0';
            const compHdr = mkHdr('20px', '#3c4043', 'normal');
            compHdr.appendChild(mkArrow()); compHdr.appendChild(mkLabel(compName)); compHdr.appendChild(mkCount(compTotal));
            const compUl = mkUl('op-children');
            toggle(compHdr, compUl);

            serMap.forEach((stepMap, serName) => {
              let serTotal = 0;
              stepMap.forEach((a) => { serTotal += a.length; });

              const serLi = document.createElement('li'); serLi.style.padding = '0';
              const serHdr = mkHdr('32px', '#5f6368', 'normal');
              serHdr.appendChild(mkArrow()); serHdr.appendChild(mkLabel(serName)); serHdr.appendChild(mkCount(serTotal));
              const serUl = mkUl('op-children');
              toggle(serHdr, serUl);

              stepMap.forEach((leaves, stepName) => {
                const stepLi = document.createElement('li'); stepLi.style.padding = '0';
                const stepHdr = mkHdr('44px', '#80868b', 'normal');
                stepHdr.appendChild(mkArrow()); stepHdr.appendChild(mkLabel(stepName)); stepHdr.appendChild(mkCount(leaves.length));
                const stepUl = mkUl('op-children');
                toggle(stepHdr, stepUl);

                leaves.forEach(({ item, art }) => {
                  const child = document.createElement('li');
                  child.style.paddingLeft = '60px';
                  child.textContent = art;
                  child.title = item.label;
                  child.onclick = function() { addOperationToQueue('dbTer', item); };
                  stepUl.appendChild(child);
                });

                stepLi.appendChild(stepHdr);
                stepLi.appendChild(stepUl);
                serUl.appendChild(stepLi);
              });

              serLi.appendChild(serHdr);
              serLi.appendChild(serUl);
              compUl.appendChild(serLi);
            });

            compLi.appendChild(compHdr);
            compLi.appendChild(compUl);
            mfrUl.appendChild(compLi);
          });

          mfrLi.appendChild(mfrHdr);
          mfrLi.appendChild(mfrUl);
          fragment.appendChild(mfrLi);
          firstMfr = false;
        });

        list.appendChild(fragment);
      }

      // БД.КОАКС — 4 levels: Провод → Тип/Серия → Производитель → Артикул
      // Built identically to renderTerTree, one extra level added.
      function renderKoaxTree() {
        const list = document.getElementById('opDbKoaxResults');
        const query = normalizeSearch(document.getElementById('opDbKoaxSearch').value);
        const rows = operationDb.dbKoax || [];
        list.innerHTML = '';

        const filtered = !query
          ? rows
          : rows.filter((item) => (item.searchText || '').indexOf(query) !== -1);

        if (!filtered.length) {
          const empty = document.createElement('li');
          empty.style.cssText = 'padding:10px;color:#80868b;font-size:12px;';
          empty.textContent = query ? 'Ничего не найдено.' : 'База не загружена.';
          list.appendChild(empty);
          return;
        }

        // wire → type → mfr → [{ item, article }]
        const wires = new Map();
        filtered.forEach((item) => {
          const w = item.coaxWire || '—';
          const t = item.coaxType || '—';
          const m = item.coaxMfr  || '—';
          const a = item.coaxArticle || (t + ' ' + w);
          if (!wires.has(w)) wires.set(w, new Map());
          const types = wires.get(w);
          if (!types.has(t)) types.set(t, new Map());
          const mfrs = types.get(t);
          if (!mfrs.has(m)) mfrs.set(m, []);
          mfrs.get(m).push({ item, article: a });
        });

        const fragment = document.createDocumentFragment();
        let first = true;

        wires.forEach((types, wireName) => {
          // L1: Провод
          let total = 0;
          types.forEach((mm) => mm.forEach((aa) => { total += aa.length; }));

          const wireLi = document.createElement('li');
          const wireHdr = document.createElement('div');
          wireHdr.className = 'op-group-header' + (first && query ? ' open' : '');
          const wa = document.createElement('span'); wa.className = 'op-arrow'; wa.textContent = '▶';
          const ws = document.createElement('span'); ws.textContent = wireName;
          const wc = document.createElement('span'); wc.className = 'op-group-count'; wc.textContent = total;
          wireHdr.appendChild(wa); wireHdr.appendChild(ws); wireHdr.appendChild(wc);

          const wireUl = document.createElement('ul');
          wireUl.className = 'op-children' + (first && query ? ' open' : '');

          types.forEach((mfrs, typeName) => {
            // L2: Тип/Серия
            let typeTotal = 0;
            mfrs.forEach((aa) => { typeTotal += aa.length; });

            const typeLi = document.createElement('li');
            typeLi.style.padding = '0';
            const typeHdr = document.createElement('div');
            typeHdr.className = 'op-group-header';
            typeHdr.style.paddingLeft = '20px';
            typeHdr.style.fontWeight = 'normal';
            typeHdr.style.color = '#3c4043';
            const ta = document.createElement('span'); ta.className = 'op-arrow'; ta.textContent = '▶';
            const ts = document.createElement('span'); ts.textContent = typeName;
            const tc = document.createElement('span'); tc.className = 'op-group-count'; tc.textContent = typeTotal;
            typeHdr.appendChild(ta); typeHdr.appendChild(ts); typeHdr.appendChild(tc);

            const typeUl = document.createElement('ul');
            typeUl.className = 'op-children';

            mfrs.forEach((leaves, mfrName) => {
              // L3: Производитель
              const mfrLi = document.createElement('li');
              mfrLi.style.padding = '0';
              const mfrHdr = document.createElement('div');
              mfrHdr.className = 'op-group-header';
              mfrHdr.style.paddingLeft = '32px';
              mfrHdr.style.fontWeight = 'normal';
              mfrHdr.style.color = '#5f6368';
              const ma = document.createElement('span'); ma.className = 'op-arrow'; ma.textContent = '▶';
              const ms = document.createElement('span'); ms.textContent = mfrName;
              const mc = document.createElement('span'); mc.className = 'op-group-count'; mc.textContent = leaves.length;
              mfrHdr.appendChild(ma); mfrHdr.appendChild(ms); mfrHdr.appendChild(mc);

              const mfrUl = document.createElement('ul');
              mfrUl.className = 'op-children';

              // L4: Артикул (leaf, clickable)
              leaves.forEach(({ item, article }) => {
                const child = document.createElement('li');
                child.style.paddingLeft = '36px';
                child.textContent = article;
                child.title = item.label;
                child.onclick = function() { addOperationToQueue('dbKoax', item); };
                mfrUl.appendChild(child);
              });

              mfrHdr.onclick = function() {
                const o = mfrHdr.classList.contains('open');
                mfrHdr.classList.toggle('open', !o);
                mfrUl.classList.toggle('open', !o);
              };
              mfrLi.appendChild(mfrHdr);
              mfrLi.appendChild(mfrUl);
              typeUl.appendChild(mfrLi);
            });

            typeHdr.onclick = function() {
              const o = typeHdr.classList.contains('open');
              typeHdr.classList.toggle('open', !o);
              typeUl.classList.toggle('open', !o);
            };
            typeLi.appendChild(typeHdr);
            typeLi.appendChild(typeUl);
            wireUl.appendChild(typeLi);
          });

          wireHdr.onclick = function() {
            const o = wireHdr.classList.contains('open');
            wireHdr.classList.toggle('open', !o);
            wireUl.classList.toggle('open', !o);
          };
          wireLi.appendChild(wireHdr);
          wireLi.appendChild(wireUl);
          fragment.appendChild(wireLi);
          first = false;
        });

        list.appendChild(fragment);
      }

      function getOperationTabConfig(dbKey) {
        const map = {
          dbOb: { searchInputId: 'opDbObSearch', resultsId: 'opDbObResults' },
          dbOp: { searchInputId: 'opDbOpSearch', resultsId: 'opDbOpResults' },
          dbTer: { searchInputId: 'opDbTerSearch', resultsId: 'opDbTerResults' },
          dbKoax: { searchInputId: 'opDbKoaxSearch', resultsId: 'opDbKoaxResults' },
        };
        return map[dbKey];
      }

      function getFilteredOperationItems(dbKey, limit) {
        const config = getOperationTabConfig(dbKey);
        const query = normalizeSearch(document.getElementById(config.searchInputId).value);
        const rows = operationDb[dbKey] || [];
        const filtered = !query
          ? rows.slice(0, limit || 80)
          : rows.filter((item) => (item.searchText || '').indexOf(query) !== -1).slice(0, limit || 80);
        return filtered;
      }

      function setupOperationSearch(dbKey) {
        const config = getOperationTabConfig(dbKey);
        const input = document.getElementById(config.searchInputId);
        input.addEventListener('input', debounce(() => {
          renderOperationResults(dbKey);
        }, 200));
      }

      // ===== Column selection settings =====

      const TER_DEFAULT_UNCHECKED = new Set(['пневма автомат', 'отр', 'с зачисткой']);
      let colSettingsActiveKey = 'ob';

      // Normalize 'dbOb'/'dbOp'/'dbTer'/'dbKoax' → 'ob'/'op'/'ter'/'coax'
      function normColKey(k) {
        return { dbOb: 'ob', dbOp: 'op', dbTer: 'ter', dbKoax: 'coax' }[k] || k;
      }

      // ── Output mode per tab ──

      function colSettingsModeKey(dbKey) {
        return 'techops-mode-v1-' + normColKey(dbKey);
      }

      function colSettingsGetMode(dbKey) {
        try { return localStorage.getItem(colSettingsModeKey(dbKey)) || 'rows'; } catch (e) { return 'rows'; }
      }

      function colSettingsSetMode(mode) {
        try { localStorage.setItem(colSettingsModeKey(colSettingsActiveKey), mode); } catch (e) {}
        updateColSettingsModeUI();
      }

      function colSettingsSepKey(dbKey) {
        return 'techops-sep-v1-' + normColKey(dbKey);
      }

      function colSettingsGetSep(dbKey) {
        try { return localStorage.getItem(colSettingsSepKey(dbKey)) || '\n'; } catch (e) { return '\n'; }
      }

      function colSettingsSetSep(sep) {
        try { localStorage.setItem(colSettingsSepKey(colSettingsActiveKey), sep); } catch (e) {}
      }

      function colSettingsCellSepKey(dbKey) {
        return 'techops-cellsep-v1-' + normColKey(dbKey);
      }

      function colSettingsGetCellSep(dbKey) {
        try { return localStorage.getItem(colSettingsCellSepKey(dbKey)) || ' | '; } catch (e) { return ' | '; }
      }

      function colSettingsSetCellSep(sep) {
        try { localStorage.setItem(colSettingsCellSepKey(colSettingsActiveKey), sep); } catch (e) {}
        delete _colPlanCache[normColKey(colSettingsActiveKey)];
      }

      function updateColSettingsModeUI() {
        const mode = colSettingsGetMode(colSettingsActiveKey);
        const sep = colSettingsGetSep(colSettingsActiveKey);
        const cellSep = colSettingsGetCellSep(colSettingsActiveKey);

        document.querySelectorAll('input[name="colOutMode"]').forEach((r) => {
          r.checked = r.value === mode;
        });

        const sepRow = document.getElementById('colSepRow');
        if (sepRow) sepRow.style.display = mode === 'cell' ? '' : 'none';

        const sepSel = document.getElementById('colSepSelect');
        if (sepSel) {
          const opts = Array.from(sepSel.options).map((o) => o.value);
          sepSel.value = opts.includes(sep) ? sep : opts[0];
        }

        const cellSepSel = document.getElementById('colCellSepSelect');
        if (cellSepSel) {
          const opts = Array.from(cellSepSel.options).map((o) => o.value);
          cellSepSel.value = opts.includes(cellSep) ? cellSep : opts[0];
        }
      }

      function openColumnSettings() {
        colSettingsActiveKey = normColKey(activeOperationDbKey);
        document.querySelectorAll('.col-settings-tab-btn').forEach((b) => {
          b.classList.toggle('active', b.dataset.key === colSettingsActiveKey);
        });
        renderColSettingsPanel();
        updateColSettingsModeUI();
        document.getElementById('colSettingsOverlay').classList.add('open');
      }

      function closeColumnSettings() {
        document.getElementById('colSettingsOverlay').classList.remove('open');
      }

      function switchColSettingsTab(dbKey, btn) {
        colSettingsActiveKey = normColKey(dbKey);
        document.querySelectorAll('.col-settings-tab-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        renderColSettingsPanel();
        updateColSettingsModeUI();
      }

      const _colSettingsCache = Object.create(null);
      const _colPlanCache = Object.create(null);

      function colSettingsStorageKey(dbKey) {
        return 'techops-cols-v1-' + normColKey(dbKey);
      }

      function colSettingsLoad(dbKey) {
        try {
          const s = localStorage.getItem(colSettingsStorageKey(dbKey));
          if (s) return JSON.parse(s);
        } catch (e) {}
        return null;
      }

      function colSettingsSave(dbKey, sel) {
        const key = normColKey(dbKey);
        try { localStorage.setItem(colSettingsStorageKey(key), JSON.stringify(sel)); } catch (e) {}
        _colSettingsCache[key] = sel;
        delete _colPlanCache[key];
      }

      function colSettingsGetHeaders(dbKey) {
        const tab = operationDb.tabs && operationDb.tabs[normColKey(dbKey)];
        return (tab && tab.columnHeaders) || [];
      }

      // Default: [{idx, on, cell}, ...] ordered by original column index
      // cell = output cell number; columns with the same number are concatenated into one cell
      function colSettingsGetDefault(dbKey, headers) {
        const key = normColKey(dbKey);
        return headers.map((h, i) => ({
          idx: i,
          on: !(key === 'ter' && TER_DEFAULT_UNCHECKED.has((h || '').toLowerCase().trim())),
          cell: i + 1,
        }));
      }

      function colSettingsGetEffective(dbKey) {
        const key = normColKey(dbKey);
        if (_colSettingsCache[key]) return _colSettingsCache[key];
        const headers = colSettingsGetHeaders(key);
        const defaults = colSettingsGetDefault(key, headers);
        if (!headers.length) return defaults;
        const stored = colSettingsLoad(key);
        let result;
        if (!stored || !Array.isArray(stored) || stored.length !== headers.length) {
          result = defaults;
        } else if (!stored[0] || typeof stored[0] !== 'object' || stored[0].idx === undefined) {
          result = defaults;
        } else if (stored[0].cell === undefined) {
          result = stored.map((item, i) => ({ ...item, cell: i + 1 }));
        } else {
          result = stored;
        }
        _colSettingsCache[key] = result;
        return result;
      }

      function applyColumnSelection(dbKey, allValues) {
        const key = normColKey(dbKey);
        const headers = colSettingsGetHeaders(key);
        if (!headers.length) return allValues;

        if (!_colPlanCache[key]) {
          const sel = colSettingsGetEffective(key);
          const active = sel.filter((item) => item.on);
          const cellGroups = new Map();
          const cellOrder = [];
          active.forEach((item) => {
            const c = item.cell !== undefined ? item.cell : 1;
            if (!cellGroups.has(c)) { cellGroups.set(c, []); cellOrder.push(c); }
            cellGroups.get(c).push(item);
          });
          _colPlanCache[key] = { cellGroups, cellOrder, cellSep: colSettingsGetCellSep(key) };
        }

        const { cellGroups, cellOrder, cellSep } = _colPlanCache[key];
        if (!cellOrder.length) return [];
        return cellOrder.map((cellNum) => {
          const parts = cellGroups.get(cellNum)
            .map((item) => { const v = allValues[item.idx]; return v !== undefined && v !== null ? String(v) : ''; })
            .filter((v) => v !== '');
          return parts.join(cellSep);
        });
      }

      function renderColSettingsPanel() {
        const dbKey = colSettingsActiveKey;
        const headers = colSettingsGetHeaders(dbKey);
        const body = document.getElementById('colSettingsBody');
        body.innerHTML = '';

        if (!headers.length) {
          const p = document.createElement('p');
          p.style.cssText = 'color:#94A3B8;font-size:12px;padding:14px;';
          p.textContent = 'Загрузите базу данных сначала.';
          body.appendChild(p);
          return;
        }

        const hint = document.createElement('div');
        hint.className = 'col-settings-hint';
        hint.textContent = '# — номер ячейки вывода. Одинаковые номера → объединяются в одну ячейку.';
        body.appendChild(hint);

        const sel = colSettingsGetEffective(dbKey);
        const frag = document.createDocumentFragment();

        sel.forEach((item, orderIdx) => {
          const row = document.createElement('div');
          row.className = 'col-row';

          const btnUp = document.createElement('button');
          btnUp.className = 'col-row-btn';
          btnUp.textContent = '▲';
          btnUp.title = 'Вверх';
          btnUp.disabled = orderIdx === 0;
          btnUp.onclick = () => {
            const cur = colSettingsGetEffective(dbKey);
            [cur[orderIdx - 1], cur[orderIdx]] = [cur[orderIdx], cur[orderIdx - 1]];
            colSettingsSave(dbKey, cur);
            renderColSettingsPanel();
          };

          const btnDown = document.createElement('button');
          btnDown.className = 'col-row-btn';
          btnDown.textContent = '▼';
          btnDown.title = 'Вниз';
          btnDown.disabled = orderIdx === sel.length - 1;
          btnDown.onclick = () => {
            const cur = colSettingsGetEffective(dbKey);
            [cur[orderIdx], cur[orderIdx + 1]] = [cur[orderIdx + 1], cur[orderIdx]];
            colSettingsSave(dbKey, cur);
            renderColSettingsPanel();
          };

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = item.on;
          cb.addEventListener('change', () => {
            const cur = colSettingsGetEffective(dbKey);
            cur[orderIdx].on = cb.checked;
            colSettingsSave(dbKey, cur);
          });

          const nameSpan = document.createElement('span');
          nameSpan.className = 'col-row-name';
          nameSpan.textContent = headers[item.idx] || '';

          // Cell number control [− N +]
          const cellCtl = document.createElement('div');
          cellCtl.className = 'col-cell-ctl';

          const curCell = item.cell !== undefined ? item.cell : orderIdx + 1;

          const btnMinus = document.createElement('button');
          btnMinus.className = 'col-row-btn';
          btnMinus.textContent = '−';
          btnMinus.title = 'Уменьшить номер ячейки';
          btnMinus.disabled = curCell <= 1;
          btnMinus.onclick = () => {
            const cur = colSettingsGetEffective(dbKey);
            if ((cur[orderIdx].cell || 1) > 1) {
              cur[orderIdx].cell = (cur[orderIdx].cell || 1) - 1;
              colSettingsSave(dbKey, cur);
              renderColSettingsPanel();
            }
          };

          const cellNumSpan = document.createElement('span');
          cellNumSpan.className = 'col-cell-num';
          cellNumSpan.textContent = curCell;

          const btnPlus = document.createElement('button');
          btnPlus.className = 'col-row-btn';
          btnPlus.textContent = '+';
          btnPlus.title = 'Увеличить номер ячейки';
          btnPlus.onclick = () => {
            const cur = colSettingsGetEffective(dbKey);
            cur[orderIdx].cell = (cur[orderIdx].cell || orderIdx + 1) + 1;
            colSettingsSave(dbKey, cur);
            renderColSettingsPanel();
          };

          cellCtl.appendChild(btnMinus);
          cellCtl.appendChild(cellNumSpan);
          cellCtl.appendChild(btnPlus);

          row.appendChild(btnUp);
          row.appendChild(btnDown);
          row.appendChild(cb);
          row.appendChild(nameSpan);
          row.appendChild(cellCtl);
          frag.appendChild(row);
        });
        body.appendChild(frag);
      }

      function colSettingsSelectAll() {
        const cur = colSettingsGetEffective(colSettingsActiveKey);
        cur.forEach((item) => { item.on = true; });
        colSettingsSave(colSettingsActiveKey, cur);
        renderColSettingsPanel();
      }

      function colSettingsClearAll() {
        const cur = colSettingsGetEffective(colSettingsActiveKey);
        cur.forEach((item) => { item.on = false; });
        colSettingsSave(colSettingsActiveKey, cur);
        renderColSettingsPanel();
      }

      function colSettingsReset() {
        const key = normColKey(colSettingsActiveKey);
        try { localStorage.removeItem(colSettingsStorageKey(key)); } catch (e) {}
        delete _colSettingsCache[key];
        delete _colPlanCache[key];
        renderColSettingsPanel();
      }

      // ===== Queue =====

      function addOperationToQueue(dbKey, item) {
        operationQueues[dbKey].push({
          dbKey,
          label: item.label,
          allValues: item.outputRow || [],
        });
        updateOperationQueueUI();
      }

      function clearOperationQueue() {
        operationQueues[activeOperationDbKey] = [];
        updateOperationQueueUI();
      }

      function removeOperationFromQueue(index) {
        operationQueues[activeOperationDbKey].splice(index, 1);
        updateOperationQueueUI();
      }

      function updateOperationQueueUI() {
        const list = document.getElementById('opQueueList');
        list.innerHTML = '';
        const currentQueue = operationQueues[activeOperationDbKey] || [];
        currentQueue.forEach((item, index) => {
          const li = document.createElement('li');
          li.innerHTML = `<span>${escapeHtml(item.label)}</span><span class="remove-btn" onclick="removeOperationFromQueue(${index})">×</span>`;
          list.appendChild(li);
        });
        document.getElementById('opQueueCount').innerText = currentQueue.length;
        document.getElementById('opPushBtn').disabled = currentQueue.length === 0;
      }

      function pushOperationsQueue() {
        const currentQueue = operationQueues[activeOperationDbKey] || [];
        if (!currentQueue.length) {
          setOperationsStatus('Очередь пуста.', true);
          return;
        }

        const targetCellA1 = document.getElementById('opTargetCell').value.trim();
        const mode = colSettingsGetMode(activeOperationDbKey);

        if (mode === 'cell') {
          const rawSep = colSettingsGetSep(activeOperationDbKey);
          // Unescape \n stored as literal backslash-n from <select>
          const sep = rawSep === '\\n' ? '\n' : rawSep;
          const text = currentQueue.map((item) => item.label).join(sep);
          setOperationsStatus('Запись в ячейку...', false);
          google.script.run
            .withSuccessHandler((result) => {
              setOperationsStatus(result.ok ? ('✅ ' + result.message) : result.message, !result.ok);
              if (result.ok) clearOperationQueue();
            })
            .withFailureHandler((error) => {
              setOperationsStatus(error.message || 'Не удалось записать.', true);
            })
            .writeSingleCellNames(text, targetCellA1);
        } else {
          const rows = currentQueue.map((item) => applyColumnSelection(item.dbKey, item.allValues || []));
          setOperationsStatus('Выгрузка техопераций...', false);
          google.script.run
            .withSuccessHandler((result) => {
              setOperationsStatus(`✅ ${result.message}`, false);
              clearOperationQueue();
            })
            .withFailureHandler((error) => {
              setOperationsStatus(error.message || 'Не удалось выгрузить техоперации.', true);
            })
            .insertOperationRows(rows, targetCellA1);
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('templateSearch').addEventListener('input', debounce(renderTemplates, 200));
        document.getElementById('templateCategoryFilter').addEventListener('change', renderTemplates);

        setupOperationSearch('dbOb');
        setupOperationSearch('dbOp');
        setupOperationSearch('dbTer');
        setupOperationSearch('dbKoax');

        document.addEventListener('click', function onDocumentClick(event) {
          if (!event.target.closest('.mini-search-wrapper')) {
            document.querySelectorAll('.mini-search-results').forEach((el) => {
              el.style.display = 'none';
            });
          }
        });

        restoreMainTab();
        loadTemplates();
        ensureOperationsLoaded(false);
      });

    </script>
  </body>
</html>
