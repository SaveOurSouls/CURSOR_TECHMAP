<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        --accent: #2563EB;
        --accent-h: #1D4ED8;
        --accent-bg: #EFF4FF;
        --txt: #111827;
        --txt2: #4B5563;
        --txt3: #9CA3AF;
        --bg: #FFFFFF;
        --surf: #F6F7F9;
        --brd: #E5E7EB;
        --r: 8px;
        --r-lg: 10px;
      }

      * { box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, 'Segoe UI', Arial, sans-serif;
        margin: 0;
        padding: 16px;
        color: var(--txt);
        font-size: 13px;
        background: var(--bg);
      }

      label {
        display: block;
        margin: 12px 0 5px;
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .05em;
        color: var(--txt2);
      }

      input,
      textarea,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 9px 11px;
        border: 1px solid var(--brd);
        border-radius: var(--r);
        font-size: 13px;
        font-family: inherit;
        color: var(--txt);
        background: var(--bg);
        outline: none;
        transition: border-color .12s, box-shadow .12s;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37,99,235,.15);
      }

      input::placeholder,
      textarea::placeholder { color: var(--txt3); }

      textarea {
        min-height: 78px;
        resize: vertical;
      }

      .hint {
        font-size: 11.5px;
        line-height: 1.5;
        color: var(--txt2);
        margin-top: 10px;
        padding: 10px 12px;
        background: var(--surf);
        border: 1px solid var(--brd);
        border-radius: var(--r);
      }

      .selection {
        padding: 10px 12px;
        border-radius: var(--r);
        background: var(--accent-bg);
        border: 1px solid #DBE5FF;
        font-size: 12px;
        color: var(--txt);
        margin-bottom: 4px;
      }

      .actions {
        margin-top: 16px;
        display: flex;
        gap: 8px;
      }

      button {
        flex: 1;
        padding: 10px 12px;
        border: 0;
        border-radius: var(--r);
        cursor: pointer;
        font-family: inherit;
        font-weight: 600;
        font-size: 13px;
        transition: background .12s;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }
      .primary:hover { background: var(--accent-h); }

      .secondary {
        background: var(--surf);
        color: var(--txt);
        border: 1px solid var(--brd);
      }
      .secondary:hover { background: #EDEFF2; }

      #status {
        margin-top: 10px;
        min-height: 18px;
        font-size: 12px;
        font-weight: 500;
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div>
      <div class="selection" id="selectionInfo">Загрузка данных о выделении...</div>

      <label for="existingTemplateId">Обновить существующий шаблон</label>
      <select id="existingTemplateId">
        <option value="">Создать новый шаблон</option>
      </select>

      <label for="title">Название шаблона</label>
      <input id="title" type="text" placeholder="Например: Монтаж разъема SMA стороны B" />

      <label for="category">Категория</label>
      <input id="category" type="text" placeholder="Например: COAX" />

      <label for="description">Описание</label>
      <textarea id="description" placeholder="Краткое описание, когда использовать шаблон"></textarea>

      <div class="hint">
        Будет сохранен текущий выделенный диапазон: значения, формулы, форматирование, объединения, размеры строк/столбцов, заметки и проверки данных. Для сотен шаблонов этот способ компактнее, чем отдельный лист на каждый шаблон.
      </div>

      <div class="actions">
        <button class="secondary" onclick="google.script.host.close()">Отмена</button>
        <button class="primary" onclick="saveTemplate()">Сохранить</button>
      </div>

      <div id="status"></div>
    </div>

    <script>
      let dialogState = null;

      function setStatus(message, isError) {
        const node = document.getElementById('status');
        node.textContent = message || '';
        node.style.color = isError ? '#c5221f' : '#174ea6';
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function populateDialog(state) {
        dialogState = state || {};
        const selection = dialogState.selection || {};
        document.getElementById('selectionInfo').innerHTML =
          `<strong>Выделение:</strong> ${escapeHtml(selection.sheetName || '')}!${escapeHtml(selection.rangeA1 || '')} ` +
          `(${escapeHtml(selection.height || 0)} x ${escapeHtml(selection.width || 0)})`;

        const select = document.getElementById('existingTemplateId');
        const templates = dialogState.templates || [];
        select.innerHTML = '<option value="">Создать новый шаблон</option>' +
          templates.map((item) => `<option value="${escapeHtml(item.id)}">${escapeHtml(item.title)} (${escapeHtml(item.sizeLabel || '')})</option>`).join('');

        // Pre-fill title and category from sheet name (e.g. "CUT_WIRE | Резка")
        const sheetName = selection.sheetName || '';
        const sepIdx = sheetName.indexOf(' | ');
        document.getElementById('title').value = sheetName;
        document.getElementById('category').value = sepIdx >= 0 ? sheetName.substring(sepIdx + 3) : '';
      }

      function onExistingTemplateChange() {
        const selectedId = document.getElementById('existingTemplateId').value;
        const templates = (dialogState && dialogState.templates) || [];
        const selected = templates.find((item) => item.id === selectedId);
        if (!selected) {
          return;
        }

        document.getElementById('title').value = selected.title || '';
        document.getElementById('category').value = selected.category || '';
        document.getElementById('description').value = selected.description || '';
      }

      function saveTemplate() {
        const title = document.getElementById('title').value.trim();
        const category = document.getElementById('category').value.trim();
        const description = document.getElementById('description').value.trim();
        const existingTemplateId = document.getElementById('existingTemplateId').value;

        if (!title) {
          setStatus('Укажите название шаблона.', true);
          return;
        }

        setStatus('Сохраняю шаблон...', false);

        google.script.run
          .withSuccessHandler((result) => {
            const skipped = (result && result.skippedImages) || 0;
            if (skipped > 0) {
              // Картинки не перенеслись (GAS-2024 не отдал blob) — НЕ закрываем молча,
              // показываем предупреждение, чтобы оператор проверил изображения шаблона.
              setStatus(`Шаблон "${result.title}" сохранён, но ${skipped} картинк(а/и) не перенесены — проверьте изображения.`, true);
              setTimeout(() => google.script.host.close(), 3500);
            } else {
              setStatus(`Шаблон "${result.title}" сохранен.`, false);
              setTimeout(() => google.script.host.close(), 500);
            }
          })
          .withFailureHandler((error) => {
            setStatus(error.message || 'Не удалось сохранить шаблон.', true);
          })
          .saveSelectedRangeAsTemplate({
            title,
            category,
            description,
            existingTemplateId,
            selection: dialogState && dialogState.selection,
          });
      }

      document.getElementById('existingTemplateId').addEventListener('change', onExistingTemplateChange);

      // State is embedded by the server — no extra round-trip needed
      populateDialog(<?!= initialState ?>);
      setStatus('Можно сохранять шаблон.', false);
    </script>
  </body>
</html>
