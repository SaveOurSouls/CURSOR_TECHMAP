<!DOCTYPE html>
<html>
<head>
  <base target="_top" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: #1a1a2e;
      background: #f5f7fb;
      margin: 0;
      padding: 12px 14px 14px;
    }

    h3 {
      font-size: 12px;
      font-weight: 700;
      color: #4a5568;
      margin: 14px 0 5px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    h3:first-child { margin-top: 0; }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    /* ── Assembly info ── */
    .info-kv { display: flex; flex-wrap: wrap; gap: 4px 20px; }
    .info-pair { font-size: 12px; }
    .info-pair span { color: #718096; }
    .info-pair strong { color: #1a202c; }

    /* ── SPY table ── */
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      background: #f7fafc;
      color: #718096;
      font-weight: 600;
      text-align: left;
      padding: 4px 8px;
      border-bottom: 1px solid #e2e8f0;
    }
    td { padding: 3px 8px; border-bottom: 1px solid #f7fafc; }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-wire { background: #fff3e0; color: #b45309; }
    .badge-term { background: #ecfdf5; color: #065f46; }
    .badge-conn { background: #eff6ff; color: #1d4ed8; }
    .badge-other{ background: #f3f4f6; color: #374151; }

    /* ── Form ── */
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #718096;
      margin: 0 0 3px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    select, input[type=number], input[type=text] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: #2d3748;
      background: #fff;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,.15);
    }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    /* ── Toggle ── */
    .toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .toggle input[type=checkbox] { width: 16px; height: 16px; accent-color: #3b82f6; cursor: pointer; }
    .toggle label { font-weight: 600; cursor: pointer; }

    /* ── Operations ── */
    .op-item {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 0 10px;
      padding: 9px 0;
      border-bottom: 1px solid #f0f4f8;
      align-items: start;
    }
    .op-item:last-child { border-bottom: none; padding-bottom: 0; }
    .op-badge {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #3b82f6;
      color: #fff;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
    }
    .op-title { font-weight: 600; font-size: 12px; margin-bottom: 6px; color: #1e3a5f; }
    .op-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .op-times  { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 5px; }
    .op-times input { font-size: 12px; padding: 5px 6px; }
    .op-empty { color: #a0aec0; font-size: 12px; padding: 4px 0; }
    .op-match {
      font-size: 11px; margin: 4px 0 2px;
      display: flex; align-items: center; gap: 4px;
    }
    .op-match.found  { color: #065f46; }
    .op-match.not-found { color: #9ca3af; }

    /* ── Chain ── */
    .chain-list { display: flex; flex-direction: column; gap: 3px; font-size: 12px; }
    .chain-row  { display: flex; align-items: center; gap: 6px; }
    .chain-num  {
      width: 18px; height: 18px; border-radius: 50%;
      background: #e0e7ff; color: #3730a3;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chain-op   { color: #718096; min-width: 140px; }
    .chain-arrow{ color: #93c5fd; }
    .chain-result { color: #1e40af; font-weight: 500; }

    /* ── Actions ── */
    .actions { display: flex; gap: 8px; margin-top: 12px; }
    button {
      flex: 1;
      padding: 9px 12px;
      border: 0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }
    .btn-primary  { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-secondary{ background: #eff6ff; color: #1d4ed8; }

    #status { margin-top: 6px; min-height: 16px; font-size: 12px; color: #2563eb; font-weight: 500; }
    #status.error { color: #dc2626; }

    .warn {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 6px; padding: 6px 10px;
      font-size: 12px; color: #92400e; margin-bottom: 6px;
    }

    .sep { height: 1px; background: #e2e8f0; margin: 6px 0; }

    .field-group { margin-bottom: 6px; }
    .field-group:last-child { margin-bottom: 0; }
  </style>
</head>
<body>

<!-- ═══ ДАННЫЕ ИЗ ЛИСТА ═════════════════════════════════════ -->
<h3>Данные из листа</h3>
<div class="card">
  <div id="assemblyInfoBlock"></div>
  <div class="sep"></div>
  <table>
    <thead><tr><th>Тип</th><th>Название / Артикул</th><th>Кол-во</th></tr></thead>
    <tbody id="spyBody"></tbody>
  </table>
</div>

<!-- ═══ ПАРАМЕТРЫ ════════════════════════════════════════════ -->
<h3>Параметры</h3>
<div class="card">

  <div class="row2" style="margin-bottom:8px">
    <div class="field-group">
      <label class="field-label">Провод</label>
      <select id="wireSelect"></select>
    </div>
    <div class="row2">
      <div class="field-group">
        <label class="field-label">Длина, мм</label>
        <input type="number" id="lengthInput" placeholder="150" min="1" />
      </div>
      <div class="field-group">
        <label class="field-label">Кол-во</label>
        <input type="number" id="wireQtyInput" value="1" min="1" />
      </div>
    </div>
  </div>

  <div class="sep"></div>

  <div class="row2" style="margin-top:8px">
    <div class="field-group">
      <label class="field-label">Терминал</label>
      <select id="termSelect"></select>
    </div>
    <div class="field-group">
      <label class="field-label">Разъём / Корпус</label>
      <select id="connSelect"></select>
    </div>
  </div>

  <div class="sep" style="margin-top:8px"></div>

  <div class="toggle" style="margin-top:8px">
    <input type="checkbox" id="sideBEnabled" />
    <label for="sideBEnabled">Сторона В (те же компоненты)</label>
  </div>

</div>

<!-- ═══ ОПЕРАЦИИ (АВТО) ═══════════════════════════════════════ -->
<h3>Операции</h3>
<div class="card" id="opsCard">
  <div class="op-empty">Выберите провод и компоненты — операции определятся автоматически</div>
</div>

<!-- ═══ ЦЕПОЧКА ══════════════════════════════════════════════ -->
<h3>Цепочка результатов</h3>
<div class="card">
  <div class="chain-list" id="chainList">
    <span style="color:#a0aec0;font-size:12px">—</span>
  </div>
</div>

<!-- ═══ ДЕЙСТВИЯ ════════════════════════════════════════════ -->
<div class="actions">
  <button class="btn-secondary" onclick="google.script.host.close()">Отмена</button>
  <button class="btn-primary" id="generateBtn" onclick="generate()">Создать техкарты</button>
</div>
<div id="status"></div>

<script>
  let D = null;
  const matchedOps = {};  // opType → matched op record

  // ── Init ────────────────────────────────────────────────────
  function init(raw) {
    D = raw;
    renderAssemblyInfo();
    renderSpyTable();
    renderWireSelect();
    renderComponentSelects();
    document.getElementById('sideBEnabled').addEventListener('change', refresh);
    refresh();
  }

  function refresh() {
    renderOpsCard();
    renderChain();
  }

  // ── Assembly info ────────────────────────────────────────────
  function renderAssemblyInfo() {
    const block = document.getElementById('assemblyInfoBlock');
    const info  = D.assemblyInfo || {};
    const entries = Object.entries(info).filter(([,v]) => v !== '' && v != null);
    if (!entries.length) {
      block.innerHTML = '<div class="warn">Таблица1 не найдена на активном листе</div>';
      return;
    }
    block.innerHTML = '<div class="info-kv">' +
      entries.map(([k, v]) =>
        `<div class="info-pair"><span>${esc(k)}: </span><strong>${esc(String(v))}</strong></div>`
      ).join('') +
      '</div>';
  }

  // ── SPY table ────────────────────────────────────────────────
  function renderSpyTable() {
    const tbody = document.getElementById('spyBody');
    const comps = D.components || [];
    if (!comps.length) {
      tbody.innerHTML = '<tr><td colspan="3" style="color:#a0aec0;text-align:center;padding:8px">Таблица СПЯ не найдена</td></tr>';
      return;
    }
    tbody.innerHTML = comps.map(c =>
      `<tr>
        <td><span class="badge ${badgeCls(c.type)}">${esc(c.type)}</span></td>
        <td>${esc(c.name)}</td>
        <td>${esc(String(c.qty))}</td>
      </tr>`
    ).join('');
  }

  function badgeCls(t) {
    const lc = (t || '').toLowerCase();
    if (lc.includes('провод') || lc.includes('wire')) return 'badge-wire';
    if (lc.includes('терминал') || lc.includes('terminal')) return 'badge-term';
    if (lc.includes('соед') || lc.includes('conn') || lc.includes('разъ')) return 'badge-conn';
    return 'badge-other';
  }

  // ── Wire select ──────────────────────────────────────────────
  function renderWireSelect() {
    const sel   = document.getElementById('wireSelect');
    const wires = getByTypes(['провод', 'wire', 'кабель', 'cable']);
    sel.innerHTML = '<option value="">— не выбран —</option>' +
      wires.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
    if (wires.length >= 1) sel.value = wires[0].id;

    // Auto-fill length from assembly name or component
    const lenEl = document.getElementById('lengthInput');
    if (!lenEl.value) {
      // Try to extract length from assembly name (e.g. "Кабель CAN 150mm")
      const asmName = Object.values(D.assemblyInfo || {}).map(v => String(v)).join(' ');
      const match = asmName.match(/(\d+)\s*мм/i);
      if (match) lenEl.value = match[1];
      else if (wires.length === 1 && wires[0].length) lenEl.value = wires[0].length;
    }

    sel.addEventListener('change', refresh);
    document.getElementById('lengthInput').addEventListener('input', refresh);
    document.getElementById('wireQtyInput').addEventListener('input', refresh);
  }

  // ── Terminal / Connector selects ─────────────────────────────
  function renderComponentSelects() {
    const terms = getByTypes(['терминал', 'terminal', 'контакт']);
    const conns = getByTypes(['соед', 'conn', 'разъ', 'корпус', 'housing']);

    const tOpts = '<option value="">— нет —</option>' +
      terms.map(c => `<option value="${c.id}">${esc(c.name)} (×${c.qty})</option>`).join('');
    const cOpts = '<option value="">— нет —</option>' +
      conns.map(c => `<option value="${c.id}">${esc(c.name)} (×${c.qty})</option>`).join('');

    document.getElementById('termSelect').innerHTML = tOpts;
    document.getElementById('connSelect').innerHTML = cOpts;

    if (terms.length >= 1) document.getElementById('termSelect').value = terms[0].id;
    if (conns.length >= 1) document.getElementById('connSelect').value = conns[0].id;

    // Auto-suggest side B if connector qty > 1
    if (conns.length >= 1 && conns[0].qty > 1) {
      document.getElementById('sideBEnabled').checked = true;
    }

    ['termSelect','connSelect'].forEach(id =>
      document.getElementById(id).addEventListener('change', refresh)
    );
  }

  // ── Auto-determine active operations ────────────────────────
  function getActiveOps() {
    const wire   = getCompById(document.getElementById('wireSelect').value);
    const term   = getCompById(document.getElementById('termSelect').value);
    const conn   = getCompById(document.getElementById('connSelect').value);
    const sideB  = document.getElementById('sideBEnabled').checked;

    const ops = [];
    if (wire) ops.push('cutWire');
    if (term) ops.push('prsTermA');
    if (conn) ops.push('insTermA');
    if (sideB && term) ops.push('prsTermB');
    if (sideB && conn) ops.push('insTermB');
    return ops;
  }

  // ── Ops card ─────────────────────────────────────────────────
  function renderOpsCard() {
    const card   = document.getElementById('opsCard');
    const active = getActiveOps();
    if (!active.length) {
      card.innerHTML = '<div class="op-empty">Выберите провод — появится минимум операция Резка</div>';
      return;
    }
    card.innerHTML = active.map((opType, i) => buildOpItem(opType, i + 1)).join('');

    active.forEach(opType => {
      const tmplSel = document.getElementById(`tmplSel_${opType}`);
      if (tmplSel) {
        // Auto-match on initial render
        onTemplateSelect(opType);
        tmplSel.addEventListener('change', () => onTemplateSelect(opType));
      }
    });
  }

  function buildOpItem(opType, num) {
    const label    = D.opLabels[opType] || opType;
    const tmplOpts = '<option value="">— не выбран —</option>' +
      (D.templates || []).map(t =>
        `<option value="${esc(t.id)}">${esc(t.title)}</option>`
      ).join('');

    return `
      <div class="op-item">
        <div class="op-badge">${num}</div>
        <div>
          <div class="op-title">${esc(label)}</div>
          <div class="field-group">
            <label class="field-label">Шаблон (_TC_LIBRARY)</label>
            <select id="tmplSel_${opType}">${tmplOpts}</select>
          </div>
          <div id="opMatch_${opType}" class="op-match not-found">— выберите шаблон —</div>
          <div class="op-times">
            <div>
              <label class="field-label">Вр.подг, сек</label>
              <input type="number" id="tPrep_${opType}" placeholder="0" min="0" />
            </div>
            <div>
              <label class="field-label">Вр.оп, сек</label>
              <input type="number" id="tOp_${opType}" placeholder="0" min="0" />
            </div>
            <div>
              <label class="field-label">Вр.маш, сек</label>
              <input type="number" id="tMachine_${opType}" placeholder="0" min="0" />
            </div>
          </div>
        </div>
      </div>`;
  }

  // Auto-match БД.ОП record by template title similarity
  function onTemplateSelect(opType) {
    const tmplSel  = document.getElementById(`tmplSel_${opType}`);
    const infoEl   = document.getElementById(`opMatch_${opType}`);
    if (!tmplSel || !infoEl) return;

    const tmpl   = (D.templates || []).find(t => t.id === tmplSel.value);
    const title  = tmpl ? (tmpl.title + ' ' + (tmpl.category || '')) : '';
    const matched = matchOpByTitle(title);

    matchedOps[opType] = matched || null;

    if (matched) {
      infoEl.textContent = `✓ БД.ОП: ${matched.opName}${matched.opNumber ? ' | ' + matched.opNumber : ''}`;
      infoEl.className   = 'op-match found';
      setVal(`tPrep_${opType}`,    matched.tPrep    || '');
      setVal(`tOp_${opType}`,      matched.tOp      || '');
      setVal(`tMachine_${opType}`, matched.tMachine  || '');
    } else if (title) {
      infoEl.textContent = '— операция в БД.ОП не найдена, введите времена вручную';
      infoEl.className   = 'op-match not-found';
    } else {
      infoEl.textContent = '— выберите шаблон —';
      infoEl.className   = 'op-match not-found';
    }
  }

  function matchOpByTitle(title) {
    const ops = D.ops || [];
    if (!title || !ops.length) return null;

    // Normalize: lowercase, replace separators with space
    const norm = s => (s || '').toLowerCase().replace(/[_\-|.+]/g, ' ').replace(/\s+/g, ' ').trim();
    const tl   = norm(title);

    // Pass 1: exact substring — op name fully contained in template title or vice versa
    for (const op of ops) {
      const on = norm(op.opName);
      if (on && (tl.includes(on) || on.includes(tl))) return op;
    }

    // Pass 2: word overlap, require ≥2 significant words (len>3)
    let best = null, bestScore = 0;
    for (const op of ops) {
      const words = norm(op.opName).split(/\s+/).filter(w => w.length > 3);
      const score = words.filter(w => tl.includes(w)).length;
      if (score >= 2 && score > bestScore) { bestScore = score; best = op; }
    }
    return best;
  }

  function setVal(id, v) {
    const el = document.getElementById(id);
    if (el) el.value = v;
  }

  // ── Chain preview ─────────────────────────────────────────────
  function renderChain() {
    const list   = document.getElementById('chainList');
    const active = getActiveOps();
    if (!active.length) {
      list.innerHTML = '<span style="color:#a0aec0;font-size:12px">—</span>';
      return;
    }
    const cfg  = buildConfig();
    let prev   = '';
    list.innerHTML = active.map((opType, i) => {
      const result = computeResult(opType, cfg, prev);
      const html = `
        <div class="chain-row">
          <div class="chain-num">${i+1}</div>
          <span class="chain-op">${esc(D.opLabels[opType] || opType)}</span>
          <span class="chain-arrow">→</span>
          <span class="chain-result">${esc(result || '…')}</span>
        </div>`;
      prev = result;
      return html;
    }).join('');
  }

  function computeResult(opType, cfg, prev) {
    const wire   = cfg.wireName || '';
    const len    = cfg.length ? `${cfg.length}мм` : '';
    const ws     = [wire, len].filter(Boolean).join(' ');
    const sA     = cfg.sideA || {};
    const sB     = cfg.sideB || {};
    switch (opType) {
      case 'cutWire':  return ws;
      case 'prsTermA': return [ws, sA.termName].filter(Boolean).join(' + ');
      case 'insTermA': return [prev, sA.connName].filter(Boolean).join(' → ') + ' ст.А';
      case 'prsTermB': return [ws, sB.termName].filter(Boolean).join(' + ');
      case 'insTermB': return [prev, sB.connName].filter(Boolean).join(' → ') + ' ст.В';
      default:         return prev;
    }
  }

  // ── Build config ──────────────────────────────────────────────
  function buildConfig() {
    const wire   = getCompById(document.getElementById('wireSelect').value);
    const term   = getCompById(document.getElementById('termSelect').value);
    const conn   = getCompById(document.getElementById('connSelect').value);
    const sideB  = document.getElementById('sideBEnabled').checked;
    const length = Number(document.getElementById('lengthInput').value) || 0;
    const wireQty= Number(document.getElementById('wireQtyInput').value) || 1;

    const info    = D.assemblyInfo || {};
    const entries = Object.entries(info);
    const findKey = (pattern) => {
      const e = entries.find(([k]) => pattern.test(k));
      return e ? String(e[1] ?? '') : '';
    };

    const sideInfo = term || conn ? {
      termName: term ? term.name : '',
      termArt:  term ? term.art  : '',
      termQty:  term ? term.qty  : 0,
      connName: conn ? conn.name : '',
      connArt:  conn ? conn.art  : '',
      connQty:  conn ? conn.qty  : 0,
    } : null;

    const active = getActiveOps();
    const ops = active.map(opType => {
      const matched = matchedOps[opType] || null;
      return {
        type:       opType,
        templateId: (document.getElementById(`tmplSel_${opType}`) || {}).value || '',
        opNum:      matched ? (matched.opNumber || '') : '',
        tPrep:      (document.getElementById(`tPrep_${opType}`)    || {}).value || '',
        tOp:        (document.getElementById(`tOp_${opType}`)      || {}).value || '',
        tMachine:   (document.getElementById(`tMachine_${opType}`) || {}).value || '',
      };
    });

    return {
      assemblyIndex: findKey(/индекс/i),
      assemblyName:  findKey(/наименование/i),
      wireName:  wire ? wire.name : '',
      wireArt:   wire ? wire.art  : '',
      wireQty,
      length,
      sideA: sideInfo,
      sideB: sideB ? sideInfo : null,
      ops,
    };
  }

  // ── Generate ──────────────────────────────────────────────────
  function generate() {
    const cfg = buildConfig();
    const opsWithTemplate = cfg.ops.filter(o => o.templateId);
    if (!opsWithTemplate.length) { setStatus('Выберите шаблон хотя бы для одной операции.', true); return; }
    if (!cfg.length)              { setStatus('Укажите длину провода.', true); return; }

    setStatus('Создаю техкарты…', false);
    document.getElementById('generateBtn').disabled = true;

    google.script.run
      .withSuccessHandler(r => {
        setStatus(`Готово — создано ${r.sheets.length} листов: ${r.sheets.join(', ')}`, false);
        setTimeout(() => google.script.host.close(), 1500);
      })
      .withFailureHandler(err => {
        setStatus(err.message || 'Ошибка генерации.', true);
        document.getElementById('generateBtn').disabled = false;
      })
      .generateAssemblyTechCards({ ...cfg, ops: opsWithTemplate });
  }

  // ── Helpers ───────────────────────────────────────────────────
  function getByTypes(types) {
    return (D.components || []).filter(c => {
      const lc = (c.type || '').toLowerCase();
      return types.some(t => lc.includes(t));
    });
  }
  function getCompById(id) {
    if (!id) return null;
    return (D.components || []).find(c => c.id === id) || null;
  }
  function setStatus(msg, err) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = err ? 'error' : '';
  }
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init(<?!= initialData ?>);
</script>
</body>
</html>
